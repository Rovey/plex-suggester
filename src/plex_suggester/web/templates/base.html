{% from "partials/icons.html" import icon_logo %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Plex Suggester{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta name="theme-color" content="#1c1c24">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>
    <nav aria-label="Main navigation">
        <a href="/" class="nav-brand"><span class="nav-logo">{{ icon_logo("icon-lg") }}</span> Plex Suggester</a>
        <button type="button" class="nav-toggle" aria-label="Menu" aria-expanded="false" onclick="toggleNav()"><span></span></button>
        <div class="nav-links" id="navLinks">
            <a href="/"{% if request.url.path == '/' %} class="active"{% endif %}>Suggestions</a>
            <a href="/excluded"{% if request.url.path == '/excluded' %} class="active"{% endif %}>Exclude List</a>
            <a href="/history"{% if request.url.path == '/history' %} class="active"{% endif %}>History</a>
        </div>
    </nav>
    <div class="nav-overlay" id="navOverlay" onclick="toggleNav()"></div>
    <main id="main">
        {% block content %}{% endblock %}
    </main>
    <footer>Plex Suggester</footer>
    <script>
    function toggleNav() {
        const links = document.getElementById('navLinks');
        const overlay = document.getElementById('navOverlay');
        const toggle = document.querySelector('.nav-toggle');
        const open = links.classList.toggle('open');
        overlay.classList.toggle('open', open);
        toggle.classList.toggle('open', open);
        toggle.setAttribute('aria-expanded', open);
    }

    /* Prevent double-submit on all forms */
    document.addEventListener('submit', function(e) {
        const form = e.target;
        if (form.dataset.submitted) {
            e.preventDefault();
            return;
        }
        form.dataset.submitted = 'true';
        const btn = form.querySelector('button[type="submit"]');
        if (btn) {
            btn.classList.add('btn-loading');
            btn.setAttribute('aria-disabled', 'true');
        }
    });

    /* Broken image fallback */
    document.addEventListener('error', function(e) {
        if (e.target.tagName === 'IMG' && (e.target.classList.contains('movie-poster') || e.target.classList.contains('movie-hero-poster'))) {
            e.target.style.display = 'none';
            const placeholder = document.createElement('div');
            placeholder.className = e.target.className + ' movie-poster-placeholder';
            placeholder.setAttribute('role', 'img');
            placeholder.setAttribute('aria-label', 'Poster unavailable');
            e.target.parentNode.insertBefore(placeholder, e.target.nextSibling);
        }
    }, true);

    /* Poster fade-in on load */
    document.addEventListener('load', function(e) {
        if (e.target.tagName === 'IMG' && (e.target.classList.contains('movie-poster') || e.target.classList.contains('movie-hero-poster'))) {
            e.target.classList.add('loaded');
        }
    }, true);

    /* Handle already-cached images */
    document.querySelectorAll('.movie-poster, .movie-hero-poster').forEach(function(img) {
        if (img.complete && img.naturalWidth > 0) img.classList.add('loaded');
    });
    </script>
</body>
</html>
