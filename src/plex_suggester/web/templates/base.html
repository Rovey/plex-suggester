<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Plex Suggester{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">Plex Suggester</a>
        <button class="nav-toggle" aria-label="Menu" aria-expanded="false" onclick="toggleNav()"><span></span></button>
        <div class="nav-links" id="navLinks">
            <a href="/"{% if request.url.path == '/' %} class="active"{% endif %}>Suggesties</a>
            <a href="/excluded"{% if request.url.path == '/excluded' %} class="active"{% endif %}>Exclude Lijst</a>
            <a href="/history"{% if request.url.path == '/history' %} class="active"{% endif %}>Geschiedenis</a>
        </div>
    </nav>
    <div class="nav-overlay" id="navOverlay" onclick="toggleNav()"></div>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>Plex Suggester — Jouw persoonlijke film&shy;gids</footer>
    <script>
    function toggleNav() {
        const links = document.getElementById('navLinks');
        const overlay = document.getElementById('navOverlay');
        const toggle = document.querySelector('.nav-toggle');
        const open = links.classList.toggle('open');
        overlay.classList.toggle('open', open);
        toggle.classList.toggle('open', open);
        toggle.setAttribute('aria-expanded', open);
    }
    </script>
</body>
</html>
